<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIBUK BOS V2.0</title>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/yDdTXEO.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Variabel Warna --- */
        :root {
            --bg-color-1: #050509;
            --bg-color-2: #0e1120;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            
            --color-aqua: #00f2fe;
            --color-purple: #4facfe;
            --color-success: #00e676; 
            
            --border-spinner: rgba(255, 255, 255, 0.05);
            --bg-progress: rgba(255, 255, 255, 0.07);
            --shadow-neon: 0 0 15px rgba(79, 172, 254, 0.5);
            --grid-color: rgba(255, 255, 255, 0.03);
        }

        :root.light-theme {
            --bg-color-1: #fdfdfd;
            --bg-color-2: #f0f4f8;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            
            --color-aqua: #2563eb; 
            --color-purple: #7c3aed;
            --color-success: #00c853; 
            
            --border-spinner: rgba(0, 0, 0, 0.05);
            --bg-progress: rgba(0, 0, 0, 0.07);
            --shadow-neon: 0 0 10px rgba(37, 99, 235, 0.2);
            --grid-color: rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: 'Inter', sans-serif; background-color: var(--bg-color-1);
            transition: background-color 0.8s ease;
        }

        /* --- Efek Latar Belakang --- */
        .bg-animations { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; overflow: hidden; opacity: 0.8; }
        
        .bg-grid {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            background-image: linear-gradient(to right, var(--grid-color) 1px, transparent 1px), linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }

        .shape {
            position: absolute; background: linear-gradient(135deg, var(--color-aqua), var(--color-purple));
            border-radius: 50%; filter: blur(90px); opacity: 0.15; animation: floatShapes 20s infinite linear;
        }
        .shape:nth-child(2) { width: 40vw; height: 40vw; min-width: 300px; min-height: 300px; top: -10%; left: -10%; animation-duration: 25s; }
        .shape:nth-child(3) { width: 35vw; height: 35vw; min-width: 250px; min-height: 250px; bottom: -5%; right: -5%; background: var(--color-purple); animation-delay: -5s; animation-duration: 20s;}

        @keyframes floatShapes {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(5vw, 5vw) rotate(90deg) scale(1.1); }
            50% { transform: translate(2vw, 8vw) rotate(180deg) scale(1); }
            75% { transform: translate(-4vw, 4vw) rotate(270deg) scale(0.9); }
        }

        /* --- Layar Loading Utama --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--bg-color-2) 0%, var(--bg-color-1) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .loader-content {
            width: 85%; max-width: 380px; 
            text-align: center; display: flex; flex-direction: column; align-items: center; z-index: 2;
        }

        /* --- Animasi Spinner --- */
        .loading-icon-container {
            position: relative; width: 80px; height: 80px; margin-bottom: 30px;
            display: flex; justify-content: center; align-items: center;
        }
        
        .loading-icon {
            position: absolute; width: 100%; height: 100%; border: 2px solid var(--border-spinner);
            border-top: 2px solid var(--color-aqua); border-bottom: 2px solid var(--color-purple);
            border-radius: 50%; animation: spin 1.5s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite; box-shadow: var(--shadow-neon);
        }
        .loading-icon-inner {
            position: absolute; width: 65%; height: 65%; border: 2px solid var(--border-spinner);
            border-left: 2px solid var(--color-purple); border-right: 2px solid var(--color-aqua);
            border-radius: 50%; animation: spinReverse 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
        }
        .loading-icon-center {
            position: absolute; width: 12px; height: 12px; background: var(--text-primary);
            border-radius: 50%; animation: pulseCenter 1.5s ease-in-out infinite; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spinReverse { 0% { transform: rotate(0deg); } 100% { transform: rotate(-360deg); } }
        @keyframes pulseCenter { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        .loading-title {
            font-size: clamp(1.4rem, 4vw, 1.6rem); 
            font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--color-aqua));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .loading-status { 
            font-size: clamp(0.85rem, 2.5vw, 0.9rem); 
            color: var(--text-secondary); margin-bottom: 35px; min-height: 20px; font-weight: 500; 
        }

        .progress-container {
            width: 100%; height: 8px; background-color: var(--bg-progress); border-radius: 20px;
            overflow: hidden; position: relative; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--color-aqua), var(--color-purple), var(--color-aqua));
            background-size: 200% 100%; border-radius: 20px; 
            transition: width 0.4s cubic-bezier(0.1, 0.5, 0.3, 1);
            position: relative; box-shadow: 0 0 15px rgba(79, 172, 254, 0.6);
            animation: gradientMove 2s linear infinite;
        }

        @keyframes gradientMove { 0% { background-position: 100% 0%; } 100% { background-position: -100% 0%; } }
        @keyframes successPulse {
            0% { box-shadow: 0 0 15px var(--color-success); }
            50% { box-shadow: 0 0 35px var(--color-success); }
            100% { box-shadow: 0 0 15px var(--color-success); }
        }

        .progress-text { 
            margin-top: 15px; font-size: 1.1rem; font-weight: 700; color: var(--color-aqua); 
            font-variant-numeric: tabular-nums; letter-spacing: 2px; text-shadow: 0 0 10px rgba(79, 172, 254, 0.5); 
        }

        /* --- Tombol Peluncur Aplikasi --- */
        .launch-btn {
            display: none; margin-top: 25px; padding: 14px 32px;
            font-size: 1rem; font-weight: 700; color: #ffffff;
            background: linear-gradient(135deg, var(--color-aqua), var(--color-purple));
            border: none; border-radius: 30px; cursor: pointer; text-decoration: none;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            letter-spacing: 1px; text-transform: uppercase;
            animation: buttonEntrance 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .launch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.8);
        }
        @keyframes buttonEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Frame Aplikasi Utama (Tetap Inline di Vercel) --- */
        #app-frame {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;
            z-index: 10; display: none; background-color: var(--bg-color-1);
        }
    </style>
</head>
<body>

    <!-- Animasi Latar Belakang -->
    <div class="bg-animations">
        <div class="bg-grid"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Screen Loader Panel -->
    <div id="loader-wrapper">
        <div class="loader-content">
            <div class="loading-icon-container">
                <div class="loading-icon"></div>
                <div class="loading-icon-inner"></div>
                <div class="loading-icon-center"></div>
            </div>
            
            <h2 class="loading-title">Initializing System</h2>
            <p class="loading-status" id="loading-status">Connecting to secure server...</p>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="progress-text" id="progress-text">0%</div>

            <!-- Tombol Pemicu Inline (Satu Tab Browser) -->
            <button class="launch-btn" id="launch-button">Masuk Aplikasi</button>
        </div>
    </div>

    <!-- Window Target Utama (Dinamis Membaca Seluruh Parameter URL) -->
    <iframe 
        id="app-frame" 
        src="" 
        allowfullscreen>
    </iframe>

    <script>
        // Pengaturan Tema Berdasarkan Waktu Otomatis
        function applyTimeBasedTheme() {
            const currentHour = new Date().getHours();
            if (currentHour >= 6 && currentHour < 18) {
                document.documentElement.classList.add('light-theme');
            } else {
                document.documentElement.classList.remove('light-theme');
            }
        }
        applyTimeBasedTheme();

        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const statusText = document.getElementById('loading-status');
        const launchButton = document.getElementById('launch-button');
        const loaderWrapper = document.getElementById('loader-wrapper');
        const iframe = document.getElementById('app-frame');

        // AMBIL PARAMETER URL (Mendukung Otomatisasi Sistem Routing Dari Backend doGet Anda)
        const currentQueryString = window.location.search; 
        const baseGasUrl = "https://script.google.com/macros/s/AKfycbwQxP9NPo_SfdP3vehpNIl2KXCwKKSuXpIXHEp7RWMajZq56AUrK5W9MH6TuJXitvHc/exec";
        
        // Gabungkan URL dasar GAS dengan query yang dilempar oleh Vercel (seperti ?page=admin atau ?sessionId=...)
        iframe.src = baseGasUrl + currentQueryString;

        let progress = 0;

        function updateProgress(value) {
            let displayValue = Math.floor(value);
            progressBar.style.width = displayValue + '%';
            progressText.innerText = displayValue + '%';
        }

        function updateStatus(value) {
            if (value < 20) { statusText.innerText = "Securing network gateway..."; } 
            else if (value < 50) { statusText.innerText = "Synchronizing database structure..."; } 
            else if (value < 80) { statusText.innerText = "Injecting server-side configuration..."; } 
            else { statusText.innerText = "System parameters validated..."; }
        }

        // Simulasi Kecepatan Loading Bar Proposional
        const simulationInterval = setInterval(() => {
            if (progress < 100) {
                progress += Math.random() * 10 + 2; 
                if (progress > 100) progress = 100;
                updateProgress(progress);
                updateStatus(progress);
            } else {
                clearInterval(simulationInterval);
                statusText.innerText = "Authentication successful. Ready.";
                
                const successColor = getComputedStyle(document.documentElement).getPropertyValue('--color-success').trim();
                progressBar.style.background = successColor;
                progressBar.style.animation = 'successPulse 1.5s ease-out infinite';

                // Tampilkan tombol akses secara halus
                setTimeout(() => {
                    launchButton.style.display = "inline-block";
                }, 400);
            }
        }, 150);

        // TRIGGER UTAMA: Membuka Aplikasi Di Dalam Vercel Menggunakan Aturan Inline Reveal 
        launchButton.addEventListener('click', function() {
            loaderWrapper.style.opacity = '0';
            loaderWrapper.style.visibility = 'hidden';
            iframe.style.display = 'block'; 
        });
    </script>

</body>
</html>
